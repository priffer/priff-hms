<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>หน้าหลักพนักงาน (ESS) - PRIFF HMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/supabase.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { kcblue: '#003366', kcyellow: '#FFCC00' }, fontFamily: { sans: ['Sarabun', 'sans-serif'] } } }
    }
  </script>
  <style>
    * { border-radius: 0 !important; }
    body { overscroll-behavior-y: none; }
  </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex justify-center md:items-start md:p-6">

  <div class="w-full max-w-md md:max-w-5xl bg-white min-h-screen md:min-h-[85vh] flex flex-col relative shadow-xl md:rounded-xl overflow-hidden md:mt-4">
    
    <header class="bg-kcblue text-white p-5 md:p-8 shrink-0 rounded-b-3xl md:rounded-none flex flex-col md:flex-row md:justify-between md:items-center">
      <div class="flex justify-between items-start md:items-center w-full md:w-auto mb-4 md:mb-0">
        <div>
          <h1 class="text-xl md:text-2xl font-bold tracking-wide">KC CLEAN TRADE</h1>
          <p class="text-xs md:text-sm text-blue-200">ระบบบริการพนักงาน (ESS)</p>
        </div>
        <button onclick="logoutEmployee()" class="md:hidden text-xs bg-white/20 hover:bg-white/30 text-white px-3 py-1 font-bold border border-white/50 transition-colors cursor-pointer">
          ออกจากระบบ
        </button>
      </div>
      
      <div class="flex items-center justify-between md:justify-end gap-4 w-full md:w-auto">
        <!-- ลบ div กรอบรูปออก เหลือแค่ชื่อกับรหัส จัดชิดขวาให้ดูคลีนขึ้น -->
        <div class="flex items-center text-left md:text-right">
            <div>
                <p id="empNameDisplay" class="font-bold text-lg md:text-xl leading-tight">กำลังโหลดข้อมูล...</p>
                <p id="empIdDisplay" class="text-sm text-kcyellow font-bold mt-0.5">KC-XXXXX</p>
            </div>
        </div>
        <button onclick="logoutEmployee()" class="hidden md:block text-sm bg-white/20 hover:bg-white/30 text-white px-4 py-2 font-bold border border-white/50 transition-colors ml-6 cursor-pointer">
          ออกจากระบบ
        </button>
      </div>
    </header>

    <main class="flex-1 p-5 md:p-8 overflow-y-auto pb-24 md:pb-8">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8 h-full">
          <div class="md:col-span-5 flex flex-col">
              <div class="bg-white border border-gray-200 p-4 shadow-sm mb-5 text-center relative z-10 md:py-8">
                <p class="text-sm md:text-base text-gray-500 font-bold mb-1" id="currentDateDisplay">กำลังโหลดวันที่...</p>
                <h2 class="text-4xl md:text-5xl font-bold text-kcblue tracking-wider" id="currentTimeDisplay">00:00:00</h2>
              </div>

              <button onclick="openTimestampCamera()" class="w-full bg-kcblue hover:bg-blue-900 text-white p-6 md:p-10 shadow-md border-b-4 border-blue-950 active:border-b-0 active:translate-y-1 transition-all flex flex-col items-center justify-center gap-2 mb-6 cursor-pointer group flex-1">
                <span class="text-4xl md:text-6xl group-hover:scale-110 transition-transform mb-2">📸</span>
                <span class="text-xl md:text-2xl font-bold tracking-wide">ถ่ายรูปลงเวลาเข้า-ออกงาน</span>
                <span class="text-xs md:text-sm text-blue-200">ระบบบันทึกพิกัด GPS อัตโนมัติ</span>
              </button>
          </div>

          <div class="md:col-span-7">
              <h3 class="text-sm md:text-lg font-bold text-gray-800 mb-4 border-l-4 border-kcyellow pl-3">บริการอื่นๆ (Self-Service)</h3>
              <div class="grid grid-cols-2 md:grid-cols-2 gap-3 md:gap-4">
                <button class="bg-gray-50 border border-gray-200 p-6 md:p-8 text-center hover:bg-gray-100 transition-colors cursor-pointer flex flex-col items-center gap-3">
                  <span class="text-3xl md:text-4xl">💸</span>
                  <span class="text-sm md:text-base font-bold text-gray-700">ขอเบิกเงินล่วงหน้า</span>
                </button>
                <button class="bg-gray-50 border border-gray-200 p-6 md:p-8 text-center hover:bg-gray-100 transition-colors cursor-pointer flex flex-col items-center gap-3">
                  <span class="text-3xl md:text-4xl">🏖️</span>
                  <span class="text-sm md:text-base font-bold text-gray-700">ขออนุมัติลางาน</span>
                </button>
                <button class="bg-gray-50 border border-gray-200 p-6 md:p-8 text-center hover:bg-gray-100 transition-colors cursor-pointer flex flex-col items-center gap-3">
                  <span class="text-3xl md:text-4xl">📄</span>
                  <span class="text-sm md:text-base font-bold text-gray-700">สลิปเงินเดือน</span>
                </button>
                <button class="bg-gray-50 border border-gray-200 p-6 md:p-8 text-center hover:bg-gray-100 transition-colors cursor-pointer flex flex-col items-center gap-3">
                  <span class="text-3xl md:text-4xl">🕒</span>
                  <span class="text-sm md:text-base font-bold text-gray-700">ประวัติลงเวลา</span>
                </button>
              </div>
          </div>
      </div>
    </main>
  </div>

  <!-- 🌟 Modal ยืนยันการออกจากระบบแบบใหม่ (ลบ flex ออกตอนเริ่มต้นเพื่อแก้ Error) -->
  <div id="logoutConfirmModal" class="hidden fixed inset-0 z-50 bg-black/70 items-center justify-center p-4">
      <div class="bg-white w-full max-w-sm p-6 shadow-2xl">
          <div class="flex items-center gap-3 mb-4">
              <div class="w-10 h-10 bg-gray-200 text-kcblue flex items-center justify-center font-bold text-xl shrink-0">?</div>
              <h3 class="text-xl font-bold text-gray-900">ยืนยันการออกจากระบบ?</h3>
          </div>
          <p class="text-sm text-gray-600 mb-6 pl-13">คุณต้องการออกจากระบบบริการพนักงาน (ESS) ใช่หรือไม่?</p>
          <div class="flex gap-3">
              <button onclick="cancelLogout()" class="flex-1 border border-gray-300 bg-gray-100 text-gray-700 py-3 text-sm font-bold hover:bg-gray-200 transition-colors cursor-pointer">ยกเลิก</button>
              <button onclick="confirmLogout()" class="flex-1 bg-kcblue text-white py-3 text-sm font-bold hover:bg-blue-900 transition-colors cursor-pointer">ออกจากระบบ</button>
          </div>
      </div>
  </div>

  <script src="js/pages/employee-dashboard.js"></script>
</body>
</html>
