<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - PRIFF HMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/supabase.js"></script>
  <link rel="stylesheet" href="dist/output.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm bg-white border border-gray-200 shadow-sm p-8">
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-900 tracking-wide">ADMIN LOGIN</h2>
      <p class="text-gray-500 text-sm mt-1">ระบบจัดการทรัพยากรบุคคล PRIFF HMS</p>
    </div>

    <div id="alertBox" class="hidden mb-6 p-4 border" role="alert"></div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">อีเมล</label>
        <input type="email" id="email" placeholder="กรอกอีเมลแอดมิน" required class="w-full border border-gray-300 p-3 focus:outline-none focus:border-kcblue focus:ring-1 focus:ring-kcblue">
      </div>
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">รหัสผ่าน</label>
        <input type="password" id="password" placeholder="••••••••" required class="w-full border border-gray-300 p-3 focus:outline-none focus:border-kcblue focus:ring-1 focus:ring-kcblue">
      </div>
      
      <div class="pt-2">
        <button type="submit" id="loginBtn" class="w-full bg-gray-900 text-white font-bold py-3 hover:bg-black transition-colors border border-gray-900">เข้าสู่ระบบ</button>
      </div>
    </form>
    
    <div class="text-center mt-6">
      <a href="index.html" class="text-sm text-gray-500 hover:text-kcblue transition-colors">← กลับไปหน้าฟอร์มรับสมัครงาน</a>
    </div>
  </div>

  <script src="js/pages/login.js"></script>
</body>
</html>
