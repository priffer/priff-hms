<div class="p-3 border-2 border-kcblue bg-blue-50 mb-4">
    <label class="block text-sm font-bold text-kcblue mb-2">อัปโหลด Resume / CV *</label>
    <div class="flex items-center gap-2">
        <input type="file" id="resumeFile" accept="image/*,.pdf" class="file-input-trigger w-full text-xs border border-gray-300 p-1 bg-white">
        <button type="button" onclick="clearFile('resumeFile')" id="btn-clear-resumeFile" class="hidden px-3 py-1 bg-gray-200 text-gray-700 hover:bg-red-500 hover:text-white text-xs font-bold border-0 rounded-none">ลบ</button>
    </div>
</div>
<input type="text" id="latestJob" placeholder="ตำแหน่งล่าสุด และ ชื่อบริษัทล่าสุด (เช่น เจ้าหน้าที่บัญชี - บริษัท ABC จำกัด) *" class="w-full h-12 border-2 border-gray-300 px-3 focus:border-kcblue outline-none rounded-none">
<textarea id="drivingAndTravel" placeholder="การเดินทางและใบอนุญาตขับขี่ (สามารถนำรถยนต์ส่วนตัวมาใช้ทำงาน หรือเดินทางไปปฏิบัติงานนอกสถานที่/ไซต์งานลูกค้า ได้หรือไม่?) *" rows="2" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
<textarea id="techAiSkills" placeholder="ทักษะด้านเทคโนโลยีและ AI ที่เชี่ยวชาญ (และสิ่งเหล่านั้นช่วยให้คุณทำงานได้รวดเร็วหรือมีประสิทธิภาพขึ้นได้อย่างไร?) *" rows="3" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
<textarea id="selfLearning" placeholder="สิ่งใหม่ล่าสุดที่คุณขวนขวายเรียนรู้ด้วยตัวเองในรอบ 6 เดือนที่ผ่านมาคืออะไร? และทำไมถึงสนใจเรื่องนี้? *" rows="3" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
<textarea id="latestMistake" placeholder="เล่าถึงความผิดพลาดล่าสุดในการทำงานที่คุณเคยทำ คุณมีวิธีแก้ปัญหาเฉพาะหน้าอย่างไร และได้เรียนรู้อะไรจากเหตุการณ์นั้น? *" rows="3" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
<textarea id="problemSolving" placeholder="เล่าประสบการณ์ปัญหาที่ยากที่สุดที่คุณเคยเจอในการทำงาน และคุณแก้ไขมันอย่างไร? *" rows="3" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
<textarea id="teamworkAttitude" placeholder="เมื่อต้องทำงานร่วมกับคนที่มีความคิดเห็นไม่ตรงกัน หรือทำงานด้วยยาก คุณมีวิธีรับมือและหาทางออกอย่างไร? *" rows="3" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
<textarea id="reasonForJoining" placeholder="ทำไมเราถึงเป็นตัวเลือกของคุณ? (เล่าถึงมุมมอง เป้าหมาย หรือความคาดหวังในการทำงาน นอกเหนือจากเรื่องผลตอบแทน) *" rows="3" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
<textarea id="careerGoal" placeholder="เป้าหมายในการทำงานของคุณในอีก 3-5 ปีข้างหน้าคืออะไร? *" rows="2" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
<input type="text" id="referencePerson" placeholder="บุคคลอ้างอิงจากที่ทำงานเก่า (ชื่อ/ตำแหน่ง/เบอร์โทร - ถ้ามี)" class="w-full h-12 border-2 border-gray-300 px-3 focus:border-kcblue outline-none rounded-none">
