<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการข้อมูลพนักงาน - PRIFF HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config/supabase.js"></script>
    <link rel="stylesheet" href="dist/output.css">
    <style>
        * { border-radius: 0 !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <div id="global-navbar"></div>

    <div class="max-w-7xl w-full mx-auto p-4 md:p-6 flex-1">
        <div class="bg-white border border-gray-300 p-4 md:p-6 shadow-none">
            
            <div class="flex justify-between items-end mb-6 border-b-2 border-gray-200 pb-4">
                <div>
                    <h2 class="text-2xl font-bold text-kcblue border-l-8 border-kcyellow pl-3">รายชื่อพนักงานทั้งหมด (Employee Directory)</h2>
                    <p class="text-sm text-gray-500 mt-1 pl-5">จัดการข้อมูลพนักงานปัจจุบัน, ดูประวัติ, และสถานะการทำงาน</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่อ หรือ รหัสพนักงาน..." class="border border-gray-300 p-2 text-sm outline-none focus:border-kcblue w-64">
                    <button onclick="searchEmployees()" class="bg-gray-800 text-white px-4 py-2 font-bold hover:bg-black cursor-pointer border-0">ค้นหา</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse border border-gray-300">
                    <thead>
                        <tr class="bg-gray-900 text-white text-sm">
                            <th class="p-3 border-b border-gray-700 font-bold w-32">รหัสพนักงาน</th>
                            <th class="p-3 border-b border-gray-700 font-bold">ชื่อ-นามสกุล</th>
                            <th class="p-3 border-b border-gray-700 font-bold">กลุ่มงาน / ตำแหน่ง</th>
                            <th class="p-3 border-b border-gray-700 font-bold">วันที่เริ่มงาน</th>
                            <th class="p-3 border-b border-gray-700 font-bold text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="employeeListBody"></tbody>
                </table>
            </div>

        </div>
    </div>

    <div id="modalContainer"></div>
    
    <script src="js/components/navbar.js"></script>
    <script src="js/services/candidateService.js"></script>
    <script src="js/pages/admin-employees.js"></script>
</body>
</html>
