<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดการเวลาทำงาน (ESS) | PRIFF HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config/supabase.js"></script>
    <link rel="stylesheet" href="dist/output.css">
    <style>
        * { border-radius: 0 !important; }
        .tab-active { background-color: #003366; color: white; border-color: #003366; }
        .tab-inactive { background-color: #f3f4f6; color: #374151; border-color: #d1d5db; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <div id="global-navbar"></div>

    <div class="max-w-7xl w-full mx-auto p-4 md:p-6 flex-1">
        <div class="bg-white border border-gray-300 p-4 md:p-6 shadow-none">
            
            <div class="space-y-6">
                <div class="flex justify-between items-center border-l-8 border-kcyellow pl-3">
                    <div>
                        <h2 class="text-2xl font-bold text-kcblue">ประวัติการลงเวลาทำงาน (ESS)</h2>
                        <p class="text-sm text-gray-500 mt-1">ตรวจสอบเวลาเข้า-ออกงาน, ดูรูปถ่ายหน้างาน และแก้ไขปัญหา</p>
                    </div>
                    <button onclick="loadAttendanceLogs()" class="border border-gray-400 bg-white text-gray-700 px-4 py-2 text-sm font-bold hover:bg-gray-100 transition-colors cursor-pointer">
                        🔄 รีเฟรชข้อมูล
                    </button>
                </div>

                <div class="overflow-x-auto border border-gray-300 bg-white">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-900 text-white text-sm uppercase tracking-wider">
                                <th class="p-3 border-b border-gray-300 font-bold">วันที่</th>
                                <th class="p-3 border-b border-gray-300 font-bold">รหัสพนง.</th>
                                <th class="p-3 border-b border-gray-300 font-bold">สถานที่ปฏิบัติงาน (ไซต์งาน)</th>
                                <th class="p-3 border-b border-gray-300 font-bold">เวลาเข้า - ออก</th>
                                <th class="p-3 border-b border-gray-300 font-bold text-center">สถานะ</th>
                                <th class="p-3 border-b border-gray-300 font-bold text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody" class="text-sm text-gray-700">
                            <tr><td colspan="6" class="p-8 text-center text-gray-500">⏳ กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <div id="reviewModal" class="hidden fixed inset-0 z-50 bg-black/80 items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg border-t-8 border-red-600 shadow-none flex flex-col max-h-[90vh]">
            
            <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-gray-50 shrink-0">
                <h3 class="text-xl font-bold text-gray-900 uppercase tracking-wide">🔴 ตรวจสอบการลงเวลา</h3>
                <button onclick="closeReviewModal()" class="text-gray-400 hover:text-red-600 font-bold text-2xl transition-colors cursor-pointer leading-none">✕</button>
            </div>
            
            <div class="p-6 overflow-y-auto grow space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">รูปถ่ายหน้างาน (ล่าสุด)</label>
                    <div class="w-full bg-gray-100 border border-gray-300 aspect-video flex items-center justify-center overflow-hidden">
                        <img id="modalPhoto" src="" alt="Photo" class="w-full h-full object-cover hidden">
                        <span id="modalNoPhoto" class="text-gray-400 text-sm font-bold">ไม่มีรูปถ่าย</span>
                    </div>
                </div>
                
                <div class="bg-yellow-50 border border-yellow-300 p-4">
                    <label class="block text-sm font-bold text-yellow-800 mb-1">หมายเหตุจากพนักงาน / พิกัด GPS</label>
                    <p id="modalRemark" class="text-sm text-gray-700 font-mono leading-relaxed"></p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">แก้ไขสถานที่ปฏิบัติงานที่ถูกต้อง <span class="text-red-500">*</span></label>
                    <select id="adminSiteSelect" class="w-full border border-gray-300 p-2 outline-none focus:border-kcblue bg-white text-sm">
                        <option value="">-- กำลังโหลดไซต์งาน --</option>
                    </select>
                    <input type="hidden" id="currentLogId">
                </div>
            </div>

            <div class="p-6 border-t border-gray-200 bg-gray-50 flex justify-end gap-3 shrink-0">
                <button onclick="closeReviewModal()" class="border border-gray-400 bg-white text-gray-700 px-6 py-2 text-sm font-bold hover:bg-gray-100 transition-colors cursor-pointer">ยกเลิก</button>
                <button onclick="saveAdminCorrection()" class="bg-kcblue text-white px-8 py-2 text-sm font-bold hover:bg-kcyellow hover:text-kcblue border border-kcblue transition-colors cursor-pointer">✅ ยืนยันการแก้ไข</button>
            </div>
            
        </div>
    </div>

    <script src="js/components/navbar.js"></script>
    <script src="js/pages/admin-attendance.js"></script>
</body>
</html>
