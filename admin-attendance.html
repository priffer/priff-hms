<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการเวลาทำงาน (ESS) - PRIFF HMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/supabase.js"></script>
  <link rel="stylesheet" href="dist/output.css"> 
  <style>
    * { border-radius: 0 !important; }
    .tab-active { background-color: #003366; color: white; border-color: #003366; }
  </style>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { kcblue: '#003366', kcyellow: '#FFCC00' }, fontFamily: { sans: ['Sarabun', 'sans-serif'] } } }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

  <div id="global-navbar"></div>

  <div class="max-w-7xl w-full mx-auto p-4 md:p-6 flex-1">
    <div class="bg-white border border-gray-300 p-4 md:p-6 shadow-none">
        
        <div class="flex justify-between items-end mb-6 border-b border-gray-100 pb-4">
            <div>
                <h2 class="text-2xl font-bold text-kcblue border-l-8 border-kcyellow pl-3">ประวัติการลงเวลาทำงาน (ESS)</h2>
                <p class="text-sm text-gray-500 mt-1 pl-5">ตรวจสอบเวลาเข้า-ออกงาน, ดูรูปถ่ายหน้างาน และแก้ไขปัญหา</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loadAttendanceLogs()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 text-sm font-bold transition-colors shadow-sm cursor-pointer border border-gray-300">
                    🔄 รีเฟรชข้อมูล
                </button>
            </div>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse border border-gray-300">
            <thead>
              <tr class="bg-gray-900 text-white text-sm">
                <th class="p-3 border-b border-gray-700 font-bold w-32">วันที่</th>
                <th class="p-3 border-b border-gray-700 font-bold">รหัสพนง.</th>
                <th class="p-3 border-b border-gray-700 font-bold">สถานที่ปฏิบัติงาน (ไซต์งาน)</th>
                <th class="p-3 border-b border-gray-700 font-bold">เวลาเข้า - ออก</th>
                <th class="p-3 border-b border-gray-700 font-bold text-center">สถานะ</th>
                <th class="p-3 border-b border-gray-700 font-bold text-center">จัดการ</th>
              </tr>
            </thead>
            <tbody id="logsTableBody" class="text-sm">
              <tr><td colspan="6" class="p-8 text-center text-gray-500">⏳ กำลังโหลดข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>

    </div>
  </div>

  <div id="reviewModal" class="hidden fixed inset-0 z-50 bg-black/80 items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg p-6 shadow-none border border-gray-300 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center border-b border-gray-200 pb-3 mb-4">
        <h3 class="text-lg font-bold text-red-600">🔴 ตรวจสอบการลงเวลาผิดพลาด</h3>
        <button onclick="closeReviewModal()" class="text-gray-400 hover:text-red-600 font-bold text-xl cursor-pointer">✕</button>
      </div>
      
      <div class="space-y-4">
        <div>
            <p class="text-xs font-bold text-gray-500 mb-1">รูปถ่ายหน้างาน (ล่าสุด):</p>
            <div class="w-full bg-gray-100 border border-gray-300 aspect-video flex items-center justify-center overflow-hidden">
                <img id="modalPhoto" src="" alt="Photo" class="w-full h-full object-cover hidden">
                <span id="modalNoPhoto" class="text-gray-400 text-sm">ไม่มีรูปถ่าย</span>
            </div>
        </div>
        
        <div class="bg-yellow-50 border border-yellow-200 p-3">
            <p class="text-xs font-bold text-yellow-800 mb-1">หมายเหตุจากพนักงาน / GPS:</p>
            <p id="modalRemark" class="text-sm text-gray-700 font-mono"></p>
        </div>

        <div class="bg-gray-50 border border-gray-200 p-4">
            <label class="block text-sm font-bold text-gray-700 mb-2">แก้ไขสถานที่ปฏิบัติงานที่ถูกต้อง:</label>
            <select id="adminSiteSelect" class="w-full border border-gray-300 p-2.5 text-sm bg-white outline-none focus:border-kcblue mb-3">
                <option value="">-- กำลังโหลดไซต์งาน --</option>
            </select>
            <input type="hidden" id="currentLogId">
            <button onclick="saveAdminCorrection()" class="w-full bg-kcblue text-white font-bold py-2.5 hover:bg-blue-900 transition-colors cursor-pointer border-none">
                ✅ ยืนยันการแก้ไขและเคลียร์ธงแดง
            </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/components/navbar.js"></script>
  <script src="js/pages/admin-attendance.js"></script>
</body>
</html>
