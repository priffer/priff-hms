<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร่วมงานกับเรา - KC Clean Trade</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/config/supabase.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { kcblue: '#003366', kcyellow: '#FFCC00' },
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    maxWidth: { '350': '1400px' } 
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-open { overflow: hidden; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        * { border-radius: 0 !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased overflow-x-hidden flex flex-col min-h-screen">

    <nav class="bg-white border-b-4 border-kcyellow sticky top-0 z-40 shadow-sm shrink-0">
        <div class="max-w-350 mx-auto px-4 lg:px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <div id="defaultLogo" class="w-10 h-10 bg-kcblue text-kcyellow font-black flex items-center justify-center text-lg shadow-sm group-hover:bg-kcyellow group-hover:text-kcblue transition-colors">KC</div>
                <span id="dynamicCompanyName" class="font-bold text-kcblue text-lg lg:text-xl uppercase tracking-widest hidden sm:block">KC CLEAN TRADE</span>
            </a>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <a href="employee-login.html" class="flex items-center gap-2 bg-gray-100 border border-gray-300 text-gray-700 px-3 py-2 text-xs sm:text-sm font-bold hover:bg-kcblue hover:text-white transition-colors">
                    <span>พนักงาน (ESS)</span>
                </a>
                <a href="login.html" class="flex items-center gap-2 bg-kcblue border border-kcblue text-white px-3 py-2 text-xs sm:text-sm font-bold hover:bg-kcyellow hover:text-kcblue transition-colors">
                    <span>Admin</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-350 w-full mx-auto flex flex-col lg:flex-row flex-1">
        <aside class="lg:w-[30%] xl:w-1/4 bg-white border-b lg:border-b-0 lg:border-r border-gray-300 p-5 lg:p-8 flex flex-col lg:sticky lg:top-16 lg:h-[calc(100vh-4rem)] overflow-y-auto no-scrollbar shrink-0">
            <h1 id="mainHeadline" class="text-2xl lg:text-3xl font-bold text-kcblue mb-2">ร่วมงานกับเรา</h1>
            <p id="subHeadline" class="text-sm text-gray-500 mb-6 leading-relaxed border-b border-gray-200 pb-6">
                กำลังโหลดเนื้อหา...
            </p>
            
            <div class="mb-8">
                <p class="font-bold text-kcblue mb-4 flex items-center gap-2 text-sm bg-blue-50 p-2 border-l-4 border-kcyellow">⭐ สวัสดิการพื้นฐาน</p>
                <ul id="welfareList" class="space-y-3 text-sm text-gray-600 pl-2">
                    <li id="welfareLoading" class="flex items-start gap-2">✔️ <span class="text-gray-400">กำลังดึงข้อมูล...</span></li>
                </ul>
            </div>

            <div class="bg-gray-50 border border-gray-300 p-4 mb-8">
                <p class="font-bold text-kcblue mb-4 flex items-center gap-2 text-sm">ค้นหาตำแหน่งงาน</p>
                <div class="space-y-4">
                    <div>
                        <input type="text" id="searchKeyword" placeholder="พิมพ์ชื่อตำแหน่งงาน..." class="w-full h-10 border border-gray-300 px-3 text-sm focus:border-kcblue outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">สถานที่ปฏิบัติงาน</label>
                        <select id="dd1" onchange="handleDd1Change()" class="w-full h-10 border border-gray-300 px-3 text-sm focus:border-kcblue outline-none font-bold text-kcblue bg-white">
                            <option value="">-- สถานที่ทั้งหมด --</option>
                        </select>
                    </div>

                    <div id="boxDd2" class="hidden">
                        <label id="lblDd2" class="block text-xs font-bold text-gray-500 mb-1">...</label>
                        <select id="dd2" onchange="handleDd2Change()" class="w-full h-10 border border-gray-300 px-3 text-sm focus:border-kcblue outline-none bg-white"></select>
                    </div>

                    <div id="boxDd3" class="hidden">
                        <label id="lblDd3" class="block text-xs font-bold text-gray-500 mb-1">...</label>
                        <select id="dd3" class="w-full h-10 border border-gray-300 px-3 text-sm focus:border-kcblue outline-none bg-white"></select>
                    </div>

                    <button onclick="filterJobs()" class="w-full bg-kcblue text-white font-bold py-2 mt-2 text-sm hover:bg-kcyellow hover:text-kcblue transition-colors border border-kcblue">
                        ค้นหา
                    </button>
                </div>
            </div>

            <div class="hidden lg:block mt-auto pt-2 text-center w-full">
                <a href="apply.html" class="inline-block w-full bg-kcyellow border-2 border-kcyellow text-kcblue text-center font-bold py-4 px-4 hover:bg-kcblue hover:text-white transition-colors shadow-md text-base">
                    📝 สมัครงาน / ฝากประวัติ
                </a>
            </div>
        </aside>

        <main class="lg:w-[70%] xl:w-3/4 p-4 lg:p-8 pb-24 lg:pb-12 bg-gray-100 flex-1">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4 border-b-2 border-gray-300 pb-4">
                <div>
                    <h2 class="text-2xl font-bold text-kcblue border-l-8 border-kcyellow pl-3 leading-tight uppercase tracking-wide">ตำแหน่งงานที่เปิดรับสมัคร</h2>
                    <p class="text-sm text-gray-500 mt-2 pl-5 font-bold">พบ <span id="jobCount">0</span> ประกาศรับสมัครงาน</p>
                </div>
            </div>

            <div id="jobGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5"></div>
            <div id="paginationControls" class="mt-12 flex justify-center items-center gap-1"></div>
        </main>
    </div>

    <div id="jobModal" class="hidden fixed inset-0 z-50 bg-black/80 items-center justify-center p-4 fade-in overflow-y-auto">
        <div class="bg-white w-full max-w-2xl shadow-2xl relative my-8 border-t-8 border-kcyellow">
            <button onclick="closeModal()" class="absolute -top-4 -right-4 bg-red-600 text-white w-10 h-10 flex items-center justify-center font-bold text-xl hover:bg-red-700 shadow-lg border-2 border-white z-10">✕</button>

            <div id="modalMediaContainer" class="w-full bg-gray-200 hidden border-b-2 border-gray-300 relative h-64 sm:h-96">
                <img id="modalImage" src="" alt="Job Flyer" class="w-full h-full object-contain hidden">
                <iframe id="modalPdf" src="" class="w-full h-full hidden" frameborder="0"></iframe>
            </div>

            <div class="p-6 md:p-8">
                <div class="flex flex-wrap items-center gap-2 mb-3">
                    <span id="modalZone" class="inline-block bg-blue-100 text-kcblue font-bold px-2 py-1 text-xs border border-kcblue">โซน: ...</span>
                </div>
                
                <h2 id="modalTitle" class="text-2xl md:text-3xl font-bold text-gray-800 mb-1">ชื่อตำแหน่งงาน</h2>
                <p id="modalCompany" class="text-lg font-bold text-kcblue mb-4">ชื่อโรงงาน / บริษัท</p>
                <p id="modalSalary" class="text-xl font-bold text-green-600 mb-6 pb-4 border-b-2 border-gray-200">รายได้: ...</p>
                
                <div id="modalContent" class="text-gray-700 whitespace-pre-line mb-8 text-sm md:text-base leading-relaxed"></div>
                
                <div class="bg-gray-50 p-4 border-2 border-gray-200 mb-6">
                    <p class="text-sm font-bold text-gray-600 mb-3 text-center">แชร์งานนี้ให้เพื่อน</p>
                    <div class="flex flex-wrap justify-center gap-3">
                        <button onclick="shareJob('line')" class="bg-[#00B900] text-white px-6 py-2 text-sm font-bold hover:bg-green-700 transition-colors">แชร์ลง LINE</button>
                        <button onclick="shareJob('facebook')" class="bg-[#1877F2] text-white px-6 py-2 text-sm font-bold hover:bg-blue-700 transition-colors">แชร์ลง Facebook</button>
                        <button onclick="shareJob('copy')" class="bg-gray-800 text-white px-6 py-2 text-sm font-bold hover:bg-black transition-colors">คัดลอกลิงก์</button>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3">
                    <button onclick="applyForThisJob()" class="flex-1 bg-kcblue text-white font-bold py-4 text-lg hover:bg-kcyellow hover:text-kcblue border-2 border-kcblue transition-colors shadow-md">
                        สมัครงานตำแหน่งนี้
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data/locations.js"></script>
    <script src="js/services/cmsService.js"></script>
    <script src="js/services/jobService.js"></script>
    
    <script src="js/pages/home/state.js"></script>
    <script src="js/pages/home/cms.js"></script>
    <script src="js/pages/home/filters.js"></script>
    <script src="js/pages/home/modal.js"></script>
    <script src="js/pages/home/main.js"></script>

</body>
</html>
