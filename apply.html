<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฟอร์มรับสมัครงาน - PRIFF HMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- ดึง CSS ทรงเหลี่ยมของเรา -->
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/supabase.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

  <div class="container d-flex justify-content-center">
    <div class="card p-4" style="max-width: 500px; width: 100%;">
      <div class="text-center mb-4">
        <h3 class="fw-bold text-success">ฟอร์มรับสมัครงาน</h3>
        <p class="text-muted small">กรุณากรอกข้อมูลและแนบเอกสารให้ครบถ้วน</p>
      </div>
      
      <div id="alertBox" class="alert" style="display: none;" role="alert"></div>

      <form id="applyForm">
        <div class="row">
          <div class="col-6 mb-3">
            <input type="text" id="firstName" class="form-control" placeholder="ชื่อจริง" required>
          </div>
          <div class="col-6 mb-3">
            <input type="text" id="lastName" class="form-control" placeholder="นามสกุล" required>
          </div>
        </div>
        <div class="mb-3">
          <input type="text" id="idCard" class="form-control" placeholder="เลขบัตร ปชช. 13 หลัก" maxlength="13" required>
        </div>
        <div class="mb-3">
          <input type="tel" id="phone" class="form-control" placeholder="เบอร์โทรศัพท์ติดต่อ" required>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-bold">แนบรูปถ่าย หรือ สำเนาบัตร ปชช. (1 ไฟล์)</label>
          <input type="file" id="uploadFile" class="form-control" accept="image/*,.pdf" required>
        </div>
        
        <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold mb-2">ส่งใบสมัคร</button>
        <a href="index.html" class="btn btn-outline-secondary w-100 fw-bold">กลับไปหน้าหลัก</a>
      </form>
    </div>
  </div>

  <!-- โยงไปหาไฟล์ประมวลผล -->
  <script src="js/pages/apply.js"></script>
</body>
</html>
