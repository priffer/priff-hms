<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฟอร์มรับสมัครงาน - PRIFF HMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/supabase.js"></script>
  <link rel="stylesheet" href="dist/output.css">
  <style>
    .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto bg-white border-0 shadow-sm p-6 md:p-10 border-t-8 border-t-kcblue">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-kcblue">ใบสมัครงาน (Application Form)</h2>
      <p class="text-gray-500 mt-2 font-bold">KC Clean Trade Co., Ltd.</p>
    </div>

    <div id="alertBox" class="hidden mb-6 p-4 border-2 font-bold text-center" role="alert"></div>

    <form id="applyForm" class="space-y-8">
      
      <div id="comp-personal-info"></div>
      <div id="comp-documents"></div>
      <div id="comp-job-selection"></div>
      
      <div id="specificFieldsContainer" class="hidden space-y-4 fade-in">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
            <input type="text" id="interestedPosition" placeholder="ตำแหน่งที่สนใจสมัครอย่างระบุชัดเจน *" required class="w-full h-12 border-2 border-gray-300 px-3 focus:border-kcblue outline-none rounded-none">
            <input type="number" id="expectedSalary" placeholder="เงินเดือนที่คาดหวัง (บาท/เดือน) *" required class="w-full h-12 border-2 border-gray-300 px-3 focus:border-kcblue outline-none rounded-none">
          </div>
          
          <div id="officeFields" class="hidden">
              <div id="comp-office-fields" class="space-y-4 bg-gray-50 p-4 border-2 border-gray-200"></div>
          </div>
          
          <div id="opsFields" class="hidden">
              <div id="comp-ops-fields" class="space-y-4 bg-gray-50 p-4 border-2 border-gray-200"></div>
          </div>
      </div>

      <div id="comp-submit-section"></div>

    </form>
  </div>

  <script src="js/data/locations.js"></script>
  <script src="js/core/loader.js"></script> 
  
  <script>
    document.addEventListener('ComponentsLoaded', () => {
        const scriptZone = document.createElement('script');
        scriptZone.src = 'js/components/zonePicker.js';
        document.body.appendChild(scriptZone);

        const scriptMain = document.createElement('script');
        scriptMain.src = 'js/pages/apply.js';
        document.body.appendChild(scriptMain);
        
        scriptZone.onload = () => {
            if(typeof ZonePicker !== 'undefined') ZonePicker.init();
        };
    });
  </script>
</body>
</html>
