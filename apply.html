<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฟอร์มรับสมัครงาน - PRIFF HMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/supabase.js"></script>
  <link rel="stylesheet" href="dist/output.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-lg bg-white border border-gray-200 shadow-sm p-8">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-kcblue">ฟอร์มรับสมัครงาน</h2>
      <p class="text-gray-500 mt-2">กรุณากรอกข้อมูลและแนบเอกสารให้ครบถ้วน</p>
    </div>

    <div id="alertBox" class="hidden mb-6 p-4 border" role="alert"></div>

    <form id="applyForm" class="space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <input type="text" id="firstName" placeholder="ชื่อจริง" required class="w-full border border-gray-300 p-3 focus:outline-none focus:border-kcblue focus:ring-1 focus:ring-kcblue">
        <input type="text" id="lastName" placeholder="นามสกุล" required class="w-full border border-gray-300 p-3 focus:outline-none focus:border-kcblue focus:ring-1 focus:ring-kcblue">
      </div>
      
      <input type="text" id="idCard" placeholder="เลขบัตร ปชช. 13 หลัก" maxlength="13" required class="w-full border border-gray-300 p-3 focus:outline-none focus:border-kcblue focus:ring-1 focus:ring-kcblue">
      <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์ติดต่อ" required class="w-full border border-gray-300 p-3 focus:outline-none focus:border-kcblue focus:ring-1 focus:ring-kcblue">
      
      <div class="pt-2">
        <label class="block text-sm font-bold text-gray-700 mb-2">แนบรูปถ่าย หรือ สำเนาบัตร ปชช. (1 ไฟล์)</label>
        <input type="file" id="uploadFile" accept="image/*,.pdf" required class="w-full text-gray-700 border border-gray-300 p-2 file:mr-4 file:py-2 file:px-4 file:border-0 file:bg-gray-100 file:text-gray-700 file:font-bold hover:file:bg-gray-200">
      </div>

      <div class="pt-4 space-y-3">
        <button type="submit" id="submitBtn" class="w-full bg-kcblue text-white font-bold py-3 hover:bg-blue-900 transition-colors border border-kcblue">ส่งใบสมัคร</button>
        <a href="index.html" class="block w-full text-center bg-transparent text-gray-600 font-bold py-3 border border-gray-400 hover:bg-gray-100 transition-colors">กลับไปหน้าหลัก</a>
      </div>
    </form>
  </div>

  <script src="js/pages/apply.js"></script>
</body>
</html>
