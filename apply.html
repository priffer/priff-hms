<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฟอร์มรับสมัครงาน - PRIFF HMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/supabase.js"></script>
  <link rel="stylesheet" href="dist/output.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto bg-white border-0 shadow-none p-6 md:p-10 border-t-8 border-t-kcblue">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-kcblue">ใบสมัครงาน (Application Form)</h2>
      <p class="text-gray-500 mt-2 font-bold">KC Clean Trade Co., Ltd.</p>
    </div>

    <div id="alertBox" class="hidden mb-6 p-4 border-2 font-bold text-center" role="alert"></div>

    <form id="applyForm" class="space-y-8">
      
      <div class="p-5 border-2 border-kcblue bg-blue-50">
        <label class="block text-lg font-bold text-kcblue mb-3">1. เลือกกลุ่มตำแหน่งงานที่ต้องการสมัคร *</label>
        <select id="jobGroup" required class="w-full border-2 border-kcblue p-3 focus:outline-none focus:border-kcyellow rounded-none bg-white font-bold text-kcblue text-lg cursor-pointer">
          <option value="">-- คลิกเพื่อเลือกกลุ่มงาน --</option>
          <option value="office">ฝ่ายออฟฟิศ / บริหาร / ฝ่ายขาย</option>
          <option value="operations">ฝ่ายปฏิบัติการ / แม่บ้าน / ทำความสะอาด</option>
        </select>
      </div>

      <div class="space-y-4">
        <h3 class="text-xl font-bold text-kcblue border-b-2 border-kcyellow pb-2">2. ข้อมูลส่วนตัว (Personal Information)</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
          <input type="text" id="fullName" placeholder="ชื่อ-นามสกุล (เต็ม) *" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
          <input type="text" id="idCard" placeholder="เลขบัตร ปชช. 13 หลัก *" maxlength="13" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
          <select id="gender" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none bg-white">
            <option value="">-- เพศ * --</option><option value="ชาย">ชาย</option><option value="หญิง">หญิง</option><option value="อื่นๆ">อื่นๆ</option>
          </select>
          <div class="w-full">
            <label class="block text-xs font-bold text-gray-500 mb-1">วัน/เดือน/ปีเกิด *</label>
            <input type="date" id="birthDate" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
          </div>
          <select id="maritalStatus" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none bg-white">
            <option value="">-- สถานภาพ * --</option><option value="โสด">โสด</option><option value="สมรส">สมรส</option><option value="หย่าร้าง">หย่าร้าง</option>
          </select>
          <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์ติดต่อ *" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
        </div>
        <input type="email" id="email" placeholder="อีเมล (ถ้ามี)" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
        <textarea id="currentAddress" placeholder="ที่อยู่ปัจจุบัน *" required rows="2" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
        <input type="text" id="emergencyContact" placeholder="บุคคลติดต่อฉุกเฉิน (ชื่อ-นามสกุล, ความสัมพันธ์, เบอร์โทร) *" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
      </div>

      <div class="space-y-4">
        <h3 class="text-xl font-bold text-kcblue border-b-2 border-kcyellow pb-2">3. ประวัติการศึกษาและการทำงาน</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <select id="educationLevel" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none bg-white">
            <option value="">-- วุฒิการศึกษาสูงสุด * --</option>
            <option value="ปริญญาโทขึ้นไป">ปริญญาโทขึ้นไป</option>
            <option value="ปริญญาตรี">ปริญญาตรี</option>
            <option value="ปวส./ปวช.">ปวส./ปวช.</option>
            <option value="ม.6 หรือต่ำกว่า">ม.6 หรือต่ำกว่า</option>
            <option value="ไม่ระบุวุฒิ">ไม่ระบุวุฒิ</option>
          </select>
          <input type="text" id="drivingAbility" placeholder="การขับขี่ (เช่น ขับรถยนต์ได้ มีใบขับขี่)" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
        </div>
        <textarea id="workExperience" placeholder="ประวัติการทำงานที่ผ่านมา (ล่าสุด) *" required rows="3" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none"></textarea>
        
        <div id="officeSkills" class="hidden grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" id="techAiSkills" placeholder="ทักษะด้านเทคโนโลยี / AI (ถ้ามี)" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
          <input type="text" id="specialSkills" placeholder="ความชำนาญพิเศษอื่นๆ" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
        </div>
      </div>

      <div class="space-y-4">
        <h3 class="text-xl font-bold text-kcblue border-b-2 border-kcyellow pb-2">4. ข้อมูลการสมัครงาน</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
          <input type="text" id="interestedPosition" placeholder="ตำแหน่งที่ต้องการสมัคร *" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
          <input type="number" id="expectedSalary" placeholder="เงินเดือนที่คาดหวัง (บาท) *" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
          <select id="workMode" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none bg-white">
            <option value="">-- รูปแบบการทำงาน * --</option>
            <option value="Full-time">ประจำ (Full-time)</option>
            <option value="Part-time">พาร์ทไทม์ (Part-time)</option>
          </select>
          <div class="w-full">
            <label class="block text-xs font-bold text-gray-500 mb-1">วันที่พร้อมเริ่มงาน *</label>
            <input type="date" id="availableStartDate" required class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none">
          </div>
        </div>

        <div id="opsSpecific" class="hidden grid-cols-1 md:grid-cols-2 gap-4 bg-gray-100 p-4 border-2 border-gray-200">
          <select id="preferredZone" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none bg-white">
            <option value="">-- โซนพื้นที่ทำงานที่สะดวก --</option>
            <option value="กรุงเทพฯ">กรุงเทพฯ</option>
            <option value="ปริมณฑล">ปริมณฑล</option>
            <option value="ต่างจังหวัด">ต่างจังหวัด</option>
          </select>
          <select id="shiftWork" class="w-full border-2 border-gray-300 p-3 focus:border-kcblue outline-none rounded-none bg-white">
            <option value="">-- สามารถทำงานเป็นกะได้หรือไม่? --</option>
            <option value="ได้">ทำเป็นกะได้</option>
            <option value="ไม่ได้">ทำเวลาปกติเท่านั้น</option>
          </select>
        </div>
      </div>

      <div class="space-y-4">
        <h3 class="text-xl font-bold text-kcblue border-b-2 border-kcyellow pb-2">5. อัปโหลดเอกสารประกอบการสมัคร</h3>
        <p class="text-sm text-red-500 font-bold">* รองรับไฟล์รูปภาพ (JPG, PNG) หรือ PDF ขนาดไม่เกิน 5MB</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-4 border-2 border-gray-200 bg-white">
                <label class="block text-sm font-bold text-kcblue mb-2">1. รูปถ่ายหน้าตรง / ครึ่งตัว *</label>
                <div class="flex items-center gap-2">
                    <input type="file" id="profilePhoto" accept="image/*" required class="file-input-trigger w-full text-xs text-gray-700 border border-gray-300 p-2 rounded-none cursor-pointer">
                    <button type="button" onclick="clearFile('profilePhoto')" id="btn-clear-profilePhoto" class="hidden px-3 py-2 bg-gray-200 text-gray-700 text-xs font-bold hover:bg-red-500 hover:text-white transition-colors cursor-pointer border-0 rounded-none">ลบ</button>
                </div>
            </div>
            
            <div class="p-4 border-2 border-gray-200 bg-white">
                <label class="block text-sm font-bold text-kcblue mb-2">2. สำเนาบัตรประชาชน *</label>
                <div class="flex items-center gap-2">
                    <input type="file" id="idCardFile" accept="image/*,.pdf" required class="file-input-trigger w-full text-xs text-gray-700 border border-gray-300 p-2 rounded-none cursor-pointer">
                    <button type="button" onclick="clearFile('idCardFile')" id="btn-clear-idCardFile" class="hidden px-3 py-2 bg-gray-200 text-gray-700 text-xs font-bold hover:bg-red-500 hover:text-white transition-colors cursor-pointer border-0 rounded-none">ลบ</button>
                </div>
            </div>
            
            <div class="p-4 border-2 border-gray-200 bg-white">
                <label class="block text-sm font-bold text-kcblue mb-2">3. สำเนาทะเบียนบ้าน *</label>
                <div class="flex items-center gap-2">
                    <input type="file" id="houseRegFile" accept="image/*,.pdf" required class="file-input-trigger w-full text-xs text-gray-700 border border-gray-300 p-2 rounded-none cursor-pointer">
                    <button type="button" onclick="clearFile('houseRegFile')" id="btn-clear-houseRegFile" class="hidden px-3 py-2 bg-gray-200 text-gray-700 text-xs font-bold hover:bg-red-500 hover:text-white transition-colors cursor-pointer border-0 rounded-none">ลบ</button>
                </div>
            </div>
            
            <div class="p-4 border-2 border-gray-200 bg-white">
                <label class="block text-sm font-bold text-kcblue mb-2">4. สำเนาวุฒิการศึกษา <span class="text-red-500 font-normal text-xs">(ถ้ามี / บังคับสำหรับออฟฟิศ)</span></label>
                <div class="flex items-center gap-2">
                    <input type="file" id="educationFile" accept="image/*,.pdf" class="file-input-trigger w-full text-xs text-gray-700 border border-gray-300 p-2 rounded-none cursor-pointer">
                    <button type="button" onclick="clearFile('educationFile')" id="btn-clear-educationFile" class="hidden px-3 py-2 bg-gray-200 text-gray-700 text-xs font-bold hover:bg-red-500 hover:text-white transition-colors cursor-pointer border-0 rounded-none">ลบ</button>
                </div>
            </div>

            <div class="p-4 border-2 border-gray-200 bg-blue-50">
                <label class="block text-sm font-bold text-kcblue mb-2" id="resumeLabel">5. Resume / CV <span class="text-red-500 font-normal text-xs">(ถ้ามี / บังคับสำหรับออฟฟิศ)</span></label>
                <div class="flex items-center gap-2">
                    <input type="file" id="resumeFile" accept="image/*,.pdf" class="file-input-trigger w-full text-xs text-gray-700 border border-gray-300 p-2 rounded-none cursor-pointer">
                    <button type="button" onclick="clearFile('resumeFile')" id="btn-clear-resumeFile" class="hidden px-3 py-2 bg-gray-200 text-gray-700 text-xs font-bold hover:bg-red-500 hover:text-white transition-colors cursor-pointer border-0 rounded-none">ลบ</button>
                </div>
            </div>
            
            <div class="p-4 border-2 border-gray-200 bg-gray-50">
                <label class="block text-sm font-bold text-kcblue mb-2">6. ใบเซอร์ / ใบผ่านงาน / ใบขับขี่ <span class="text-gray-500 font-normal text-xs">(ถ้ามี)</span></label>
                <div class="flex items-center gap-2">
                    <input type="file" id="certificateFile" accept="image/*,.pdf" class="file-input-trigger w-full text-xs text-gray-700 border border-gray-300 p-2 rounded-none cursor-pointer">
                    <button type="button" onclick="clearFile('certificateFile')" id="btn-clear-certificateFile" class="hidden px-3 py-2 bg-gray-200 text-gray-700 text-xs font-bold hover:bg-red-500 hover:text-white transition-colors cursor-pointer border-0 rounded-none">ลบ</button>
                </div>
            </div>
        </div>
      </div>

      <div class="p-4 bg-gray-50 border-2 border-gray-300 flex items-start gap-3">
        <input type="checkbox" id="pdpaConsent" required class="mt-1 w-5 h-5 cursor-pointer accent-kcblue rounded-none">
        <label for="pdpaConsent" class="text-sm text-gray-700 cursor-pointer">
          <strong>ความยินยอมการประมวลผลข้อมูลส่วนบุคคล (PDPA) *</strong><br>
          <span id="pdpaBody" class="text-gray-600">กำลังโหลดข้อกำหนด...</span>
        </label>
      </div>

      <div class="pt-4 space-y-3">
        <button type="submit" id="submitBtn" class="w-full bg-kcblue text-white font-bold py-4 hover:bg-kcyellow hover:text-kcblue transition-colors border-0 cursor-pointer rounded-none text-xl">ส่งใบสมัครงาน</button>
        <a href="index.html" class="block w-full text-center bg-gray-200 text-gray-700 font-bold py-3 hover:bg-gray-300 transition-colors border-0 rounded-none">กลับสู่หน้าหลัก</a>
      </div>
    </form>
  </div>

  <script src="js/pages/apply.js"></script>
</body>
</html>
